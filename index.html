<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nheo Website</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  background: url("logo.jpg") no-repeat center/cover;
  color: #fff;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 500px;
  padding: 20px;
  backdrop-filter: blur(6px);
  background: rgba(0, 0, 0, 0.5);
}

h1 {
  font-size: 42px;
  color: #ffdddd;
  margin-bottom: 10px;
}

h2 {
  font-size: 20px;
  margin-bottom: 5px;
}

.muted {
  font-size: 16px;
  opacity: 0.8;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  background: #00b48d;
  color: #fff;
  font-weight: bold;
  border-radius: 8px;
  margin-top: 5px;
  cursor: pointer;
}

button:active {
  transform: scale(0.98);
}

.section {
  margin-top: 30px;
}

.song {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

.song span {
  font-size: 16px;
}

.song button {
  width: auto;
  padding: 6px 10px;
  font-size: 12px;
}

.footer {
  margin-top: 40px;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

  <h1>NHEO</h1>

  <div class="section">
    <h2>New Drop</h2>
    <p class="muted">I ALSO BREAK 2</p>
    <button onclick="window.open('https://youtu.be/xd9n_YV9Zkc?si=m87rDCxdMBBJuqw4')">Listen</button>
  </div>

  <div class="section">
    <div class="song">
      <span>I Can</span>
      <button onclick="window.open('https://youtu.be/rV-nPYyO8nc?si=gBuShDlFlvIgwf52')">Play</button>
    </div>

    <div class="song">
      <span>I Just Want To Make You Smile</span>
      <button onclick="window.open('https://youtu.be/ZTDFBxgRUaE?si=XIPgtvKSS-Ks2Rvk')">Play</button>
    </div>

    <div class="song">
      <span>Veronica</span>
      <button onclick="window.open('https://youtu.be/n-u46jsNHPQ?si=aFW96y2rEM73wEzi')">Play</button>
    </div>
  </div>

  <div class="footer">
    Nheo. With VAND
  </div>

</div>

</body>
</html>
